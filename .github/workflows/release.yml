name: Build and Release POS

on:
  push:
    tags:
      - 'v*' # Se dispara al crear un tag como v1.0.0

jobs:
  release:
    runs-on: windows-latest # Asumiendo target Windows para cajas de POS

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build Python Backend
        run: |
          cd local_backend
          pip install -r requirements.txt
          pyinstaller --name xion_backend --onefile main.py
        # El ejecutable quedará en local_backend/dist/xion_backend.exe

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install JS Dependencies
        run: |
          cd electron_app
          npm ci

      - name: Prepare code signing certificates
        # This step writes the Windows PFX from a secret so electron-builder can pick it up
        run: |
          cd electron_app
          # `WINDOWS_CERTIFICATE` should be the base64-encoded .p12/.pfx file stored in GitHub Secrets
          if [ -n "${{ secrets.WINDOWS_CERTIFICATE }}" ]; then
            echo "$WINDOWS_CERTIFICATE" | base64 --decode > windows-certificate.p12
          fi
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}

      - name: Build and Publish Electron App
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ github.workspace }}/electron_app/windows-certificate.p12
          CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
          # CSC_NAME can be provided if needed for dual-signing
          # MAC_CERT: ${{ secrets.MAC_CERTIFICATE }}
          # MAC_CERT_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
        run: |
          cd electron_app
          npm run build
          # electron-builder compilará, firmará y subirá los artefactos a los GitHub Releases
          npx electron-builder --publish always
